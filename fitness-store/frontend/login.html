<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – FitStore Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-wrapper">
        <div class="login-brand">
            <div class="brand-icon">💪</div>
            <h1>FitStore <span>Pro</span></h1>
            <p>Your premium supplement destination</p>
        </div>

        <div class="login-card">
            <h2>Welcome Back</h2>
            <p class="login-subtitle">Sign in to continue shopping</p>

            <div id="login-error" class="login-error" style="display:none;"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="login-hint">
                <p><strong>User:</strong> user / user123</p>
                <p><strong>Admin:</strong> admin / admin123</p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
