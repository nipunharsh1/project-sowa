<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Supplement Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🏋️ Fitness Supplement Store</h1>
        <div class="cart-container">
            <span class="cart-toggle" onclick="toggleCart()">🛒 Cart: <span id="cart-count">0</span> items</span>
            <button onclick="clearCart()">Clear Cart</button>
        </div>
    </header>

    <main id="products-container">
        <!-- Products will be loaded here -->
        <p class="loading">Loading products...</p>
    </main>
    <!-- Cart Sidebar / Modal -->
    <div id="cart-modal" class="cart-modal">
        <div class="cart-content">
            <span class="close-cart" onclick="toggleCart()">&times;</span>
            <h2>Your Shopping Cart</h2>
            <div id="cart-items-container">
                <!-- Cart items will be dynamically injected here -->
            </div>
            <div class="cart-summary">
                <h3>Total: <span id="cart-total">$0.00</span></h3>
                <button class="checkout-btn" onclick="alert('Proceeding to checkout...')">Checkout</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
